site_name: FlowO
site_description: A unified PostgreSQL-based logging plugin and backend for Snakemake
site_author: Haomiao Zhang
site_url: https://flowo-docs.pages.dev/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Manual:
      - Overview: user-manual/overview.md
      - Installation: user-manual/installation.md
      - Environment variables: reference/environment-variables.md
      - Login and CLI Setup: user-manual/login-cli.md
      - Run Snakemake with FlowO: user-manual/run-snakemake.md
      - Dashboard: user-manual/dashboard.md
      - Runs and Workflow Detail: user-manual/workflow-detail.md
      - Jobs, Logs, and Errors: user-manual/jobs-logs-errors.md
      - Results Preview: user-manual/results-preview.md
      - Catalog and Templates: user-manual/catalog.md
      - DAG Preview: user-manual/dag-preview.md
  - Architecture:
      - Overview: architecture/overview.md
      - Data Flow: architecture/data-flow.md
      - Catalog Storage Model: architecture/catalog-storage.md
  - Advanced Features:
      - MCP Integration: advanced/mcp.md
      - Email Notifications: advanced/email-notifications.md
  - FAQ: faq.md
