name: Tests

on:
  pull_request:
  push:

jobs:
  lint-and-compat:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test runners
        run: python -m pip install --upgrade pip nox uv

      - name: Run Ruff
        run: nox -s lint

      - name: Run Snakemake compatibility matrix
        run: nox -s tests
