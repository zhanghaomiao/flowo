name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Type of version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      description:
        description: "Release description (optional)"
        required: false
        default: ""
        type: string

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use PAT so the pushed tag can trigger downstream publish workflows.
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync release branch
        run: |
          git fetch --tags origin
          git pull --ff-only origin "${{ github.ref_name }}"

      - name: Calculate next version
        id: bump
        run: |
          OLD_VERSION=$(grep -m 1 "^version =" pyproject.toml | cut -d '=' -f 2 | tr -d '"' | tr -d "'" | tr -d ' ')

          echo "Current Version: $OLD_VERSION"

          IFS='.' read -r major minor patch <<< "$OLD_VERSION"

          case "${{ github.event.inputs.bump_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          NEW_VERSION="$major.$minor.$patch"
          TAG="v$NEW_VERSION"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists locally."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin."
            exit 1
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "New Version: $NEW_VERSION"

      - name: Update version files
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("pyproject.toml")
          text = path.read_text()
          new_text, count = re.subn(
              r'(?m)^version = ["\'][^"\']+["\']',
              f'version = "{os.environ["NEW_VERSION"]}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Expected exactly one project version in pyproject.toml")
          path.write_text(new_text)
          PY

          npm --prefix frontend version "$NEW_VERSION" --no-git-tag-version

      - name: Verify version files
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          expected = os.environ["NEW_VERSION"]
          pyproject = Path("pyproject.toml").read_text()
          match = re.search(r'(?m)^version = ["\']([^"\']+)["\']', pyproject)
          if not match or match.group(1) != expected:
              raise SystemExit("pyproject.toml version was not updated correctly")

          package_json = json.loads(Path("frontend/package.json").read_text())
          package_lock = json.loads(Path("frontend/package-lock.json").read_text())
          root_lock = package_lock.get("packages", {}).get("", {})

          checks = {
              "frontend/package.json": package_json.get("version"),
              "frontend/package-lock.json": package_lock.get("version"),
              "frontend/package-lock.json packages['']": root_lock.get("version"),
          }
          for label, actual in checks.items():
              if actual != expected:
                  raise SystemExit(f"{label} is {actual!r}, expected {expected!r}")
          PY

      - name: Commit and push version tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          DESC="${{ github.event.inputs.description }}"
          if [ -z "$DESC" ]; then
            DESC="chore: bump version to ${{ steps.bump.outputs.NEW_VERSION }}"
          fi

          git add pyproject.toml frontend/package.json frontend/package-lock.json
          git commit -m "$DESC"

          git tag -a "${{ steps.bump.outputs.TAG }}" -m "$DESC"

          # Keep the version commit and tag atomic: either both land, or neither does.
          git push --atomic origin "${{ github.ref_name }}" "${{ steps.bump.outputs.TAG }}"

      - name: Post-release hint
        run: |
          echo "Created ${{ steps.bump.outputs.TAG }}."
          echo "PyPI publish is triggered by the tag."
          echo "Docs and GHCR images remain independent manual workflows when needed."
