# Container images + GitHub Release are manual so a version tag can publish to PyPI
# without building multi-arch Docker (see pypi-publish.yml on tag push).
# Run this workflow from Actions when you need GHCR images for a given tag.
name: Build, Push to GHCR and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag (e.g. v2.0.4)"
        required: true
        type: string
      mark_latest:
        description: "Also tag images as latest on GHCR"
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - component: flowo
            context: .
            dockerfile: ./Dockerfile
            suffix: ""
          - component: backend
            context: .
            dockerfile: ./Dockerfile.backend
            suffix: "/backend"
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            suffix: "/frontend"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}${{ matrix.suffix }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=true
            type=raw,value=latest,enable=${{ inputs.mark_latest }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
